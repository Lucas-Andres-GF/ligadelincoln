name: Scraper Partidos

on:
  schedule:
    - cron: '*/30 17-1 * * 6,0'  # Cada 30 min, 17-01 UTC (14-22hs Argentina), sábados y domingos
    - cron: '*/30 17-0 2 4 *'  # 2 de abril 2026 (jueves), 17-00 UTC (14-21hs Argentina)
  workflow_dispatch:
    inputs:
      skip:
        description: 'Activar para skippear esta ejecución'
        type: boolean
        default: false

jobs:
  scraper:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 supabase

      - name: Run scraper
        if: ${{ !inputs.skip }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: cd backend/scripts && python scraper_resultados.py

      - name: Skip execution
        if: ${{ inputs.skip }}
        run: echo "Scraper skippeado manualmente"
