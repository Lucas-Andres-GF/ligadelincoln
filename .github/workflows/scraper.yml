name: Scraper Partidos

on:
  schedule:
    - cron: '*/30 14-21 * * 6,0'  # Cada 30 min, 14-21hs, sábados y domingos
    - cron: '*/30 14-21 2 4 *'  # 2 de abril 2026 (jueves), 14-21hs
    - cron: '*/30 21-23 30 3 *'  # 30 de marzo 2026 (lunes), 21-23hs
    - cron: '0 0 31 3 *'        # 31 de marzo 2026 (martes), 00:00
  workflow_dispatch:
    inputs:
      skip:
        description: 'Activar para skippear esta ejecución'
        type: boolean
        default: false

jobs:
  scraper:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 supabase

      - name: Run scraper
        if: ${{ !inputs.skip }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: cd backend/scripts && python scraper_resultados.py

      - name: Skip execution
        if: ${{ inputs.skip }}
        run: echo "Scraper skippeado manualmente"
