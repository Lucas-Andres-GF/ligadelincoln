name: Vercel Production Deployment

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --legacy-peer-deps
        working-directory: frontend

      - name: Build Project
        run: |
          rm -rf frontend/.vercel
          rm -rf frontend/node_modules/.astro
          npm run build
        working-directory: frontend

      - name: Deploy to Vercel
        run: npx vercel deploy frontend/dist/ --prod --yes --force --token=${{ secrets.VERCEL_TOKEN }} --project=ligadelincoln